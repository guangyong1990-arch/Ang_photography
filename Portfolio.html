<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/Portfolio.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="js/Portfolio.js" defer></script>
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="About.html">about</a>
        <a href="Portfolio.html" class="active">Portfolio</a>
    </nav>

    <main class="portfolio-page">
        <header class="page-header">
            <h1 class="eyebrow">Photography Portfolio</h1>
            <p class="intro">Discover inspired imagery in architecture, movement, and street moments.</p>
        </header>

        <section class="gallery-panel">
            <div class="filter-group" role="group" aria-label="Portfolio categories">
                <button type="button" class="btn " aria-pressed="true" onclick="showBuilding(event)">Building</button>
                <button type="button" class="btn" aria-pressed="false" onclick="showTransport(event)">Transport</button>
                <button type="button" class="btn" aria-pressed="false" onclick="showStreet(event)">Street</button>
            </div>


            <div class="gallery-window">
                <div class="image-group active" id="Building-group">
                    <div class="column"><img src="image/building/B(1).jpeg" alt="Building series image 1"></div>
                    <div class="column"><img src="image/building/B(2).jpeg" alt="Building series image 2"></div>
                    <div class="column"><img src="image/building/B(3).jpeg" alt="Building series image 3"></div>
                    <div class="column"><img src="image/building/B(4).jpeg" alt="Building series image 4"></div>
                    <div class="column"><img src="image/building/B(5).jpeg" alt="Building series image 5"></div>
                    <div class="column"><img src="image/building/B(6).jpeg" alt="Building series image 6"></div>
                    <div class="column"><img src="image/building/B(7).jpeg" alt="Building series image 7"></div>
                    <div class="column"><img src="image/building/B(8).jpeg" alt="Building series image 8"></div>
                    <div class="column"><img src="image/building/B(9).jpeg" alt="Building series image 9"></div>
                    <div class="column"><img src="image/building/B(10).jpeg" alt="Building series image 10"></div>
                    <div class="column"><img src="image/building/B(11).jpeg" alt="Building series image 11"></div>
                </div>

                <div class="image-group" id="transport-group">
                    <div class="column"><img src="image/Vehicle/T(1).jpg" alt="Transport series image 1"></div>
                    <div class="column"><img src="image/Vehicle/T(2).jpg" alt="Transport series image 2"></div>
                    <div class="column"><img src="image/Vehicle/T(3).jpg" alt="Transport series image 3"></div>
                    <div class="column"><img src="image/Vehicle/T(4).jpg" alt="Transport series image 4"></div>
                    <div class="column"><img src="image/Vehicle/T(5).jpg" alt="Transport series image 5"></div>
                    <div class="column"><img src="image/Vehicle/T(6).jpg" alt="Transport series image 6"></div>
                    <div class="column"><img src="image/Vehicle/T(7).jpg" alt="Transport series image 7"></div>
                </div>

                <div class="image-group" id="Street-group">
                    <div class="column"><img src="image/street/S(1).jpg" alt="Street series image 1"></div>
                    <div class="column"><img src="image/street/S(2).jpg" alt="Street series image 2"></div>
                    <div class="column"><img src="image/street/S(3).jpg" alt="Street series image 3"></div>
                    <div class="column"><img src="image/street/S(4).jpg" alt="Street series image 4"></div>
                    <div class="column"><img src="image/street/S(5).jpg" alt="Street series image 5"></div>
                    <div class="column"><img src="image/street/S(6).jpg" alt="Street series image 6"></div>
                    <div class="column"><img src="image/street/S(7).jpg" alt="Street series image 7"></div>
                    <div class="column"><img src="image/street/S(8).jpg" alt="Street series image 8"></div>
                    <div class="column"><img src="image/street/S(9).jpg" alt="Street series image 9"></div>
                    <div class="column"><img src="image/street/S(10).jpg" alt="Street series image 10"></div>
                    <div class="column"><img src="image/street/S(11).jpg" alt="Street series image 11"></div>
                    <div class="column"><img src="image/street/S(12).jpg" alt="Street series image 12"></div>
                </div>
            </div>
        </section>
    </main>
</body>
